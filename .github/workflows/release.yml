name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          name="agentdb233-server-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -trimpath \
              -ldflags "-s -w -X github.com/neko233-com/agentdb233/internal/version.Version=${GITHUB_REF_NAME} -X github.com/neko233-com/agentdb233/internal/version.Commit=${GITHUB_SHA} -X github.com/neko233-com/agentdb233/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "dist/${name}" ./cmd/agentdb233-server
          (cd dist && sha256sum "${name}" > "${name}.sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: agentdb233-server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Pack skill
        run: |
          npm run test:skill
          npm run pack:skill
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
